<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WAR.gov UAP Archive</title>
  <style>
    html,body{margin:0;min-height:100%;background:#05070a;color:#eef3f8;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    main{min-height:100vh;display:grid;place-items:center;padding:48px;}
    section{max-width:820px;border:1px solid rgba(255,255,255,.12);background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.02));border-radius:28px;padding:42px;box-shadow:0 40px 120px rgba(0,0,0,.45);}
    .eyebrow{color:#8bbcff;letter-spacing:.18em;text-transform:uppercase;font-size:12px;font-weight:700;}
    h1{font-size:clamp(40px,7vw,84px);line-height:.92;margin:18px 0;background:linear-gradient(90deg,#fff,#9cc7ff 45%,#c6ffef);-webkit-background-clip:text;color:transparent;}
    p{font-size:18px;line-height:1.7;color:#b8c4d2;}
    code{color:#c6ffef;}
  </style>
</head>
<body>
<main>
<section>
  <div class="eyebrow">PURSUE / UAP disclosure archive</div>
  <h1>Gallery coming online.</h1>
  <p>The repository is live. The full designed explorer for the WAR.gov PDF and video releases will be built here next.</p>
  <p>Metadata is staged in <code>/data</code>; large source media remains in the verified local archive for now.</p>
</section>
</main>
</body>
</html>
