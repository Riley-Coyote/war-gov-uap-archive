<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#030407" />
  <title>PURSUE Archive — WAR.gov UAP Gallery</title>
  <link rel="preconnect" href="https://www.war.gov" />
  <link rel="preconnect" href="https://www.dvidshub.net" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="stars" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brandline" aria-label="PURSUE Archive canvas header">
      <a class="brand" href="./" aria-label="PURSUE Archive home">Pursue</a>
      <span class="dot">•</span>
      <span id="viewLabel">CANVAS VIEW</span>
      <span class="dot">•</span>
      <span><strong id="recordCount">—</strong> RECORDS</span>
    </div>

    <nav class="topnav" aria-label="Archive controls">
      <button id="aboutBtn" class="ghost">about</button>
      <a class="ghost" href="https://www.war.gov/UFO/" target="_blank" rel="noreferrer">source</a>
    </nav>
  </header>

  <aside class="filterDock" aria-label="Filters">
    <label class="searchBox">
      <span>search archive</span>
      <input id="searchInput" type="search" placeholder="orb, nasa, harare, saucer…" autocomplete="off" />
    </label>

    <div class="filterGroup" data-filter="release">
      <span>release</span>
      <button data-value="all" class="active">all</button>
      <button data-value="5/8/26">01</button>
      <button data-value="5/22/26">02</button>
      <button data-value="6/12/26">03</button>
    </div>

    <div class="filterGroup" data-filter="type">
      <span>signal</span>
      <button data-value="all" class="active">all</button>
      <button data-value="PDF">pdf</button>
      <button data-value="VID">video</button>
      <button data-value="AUD">audio</button>
    </div>
  </aside>

  <main class="viewport" id="viewport" aria-label="Interactive archive canvas">
    <section class="canvas" id="canvas" aria-live="polite"></section>
  </main>

  <section class="inspector" id="inspector" aria-label="Selected record preview">
    <div class="inspectorInner">
      <div class="inspectorKicker" id="inspectorKicker">NO RECORD SELECTED</div>
      <h2 id="inspectorTitle">Select a signal tile</h2>
      <p id="inspectorText">Hover or click any artifact in the canvas to inspect its release metadata and open source media.</p>
    </div>
  </section>

  <div class="zoomDock" aria-label="Canvas zoom controls">
    <button id="zoomOut" aria-label="Zoom out">−</button>
    <output id="zoomReadout">32%</output>
    <button id="zoomIn" aria-label="Zoom in">+</button>
    <button id="fitAll">FIT ALL</button>
  </div>

  <div class="modeDock" aria-label="View shortcuts">
    <button id="canvasMode" class="active">canvas</button>
    <button id="listMode">list</button>
  </div>

  <dialog id="recordDialog" class="recordDialog">
    <form method="dialog">
      <button class="closeBtn" aria-label="Close dialog">× close</button>
    </form>
    <article class="dialogGrid">
      <section class="mediaPanel" id="mediaPanel"></section>
      <section class="metaPanel">
        <div class="recordType" id="dialogType">PDF</div>
        <h1 id="dialogTitle"></h1>
        <p id="dialogDescription"></p>
        <dl id="dialogMeta"></dl>
        <div class="dialogActions" id="dialogActions"></div>
      </section>
    </article>
  </dialog>

  <template id="cardTemplate">
    <button class="recordCard" type="button">
      <span class="cardGlow"></span>
      <span class="typePill"></span>
      <span class="releasePill"></span>
      <span class="visual"></span>
      <span class="cardTitle"></span>
      <span class="cardMeta"></span>
    </button>
  </template>

  <script src="./app.js" defer></script>
</body>
</html>
